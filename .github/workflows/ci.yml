name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: pytest + selftest (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install ATMS in editable mode (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Palette drift guard (v0.16.10)
        # Fails if src/atms/static/palette-data.json is out of sync
        # with src/atms/models.py — i.e. a contributor edited
        # ComponentType but didn't re-run `make palette`. The
        # tests/test_palette.py suite also covers this, but the
        # explicit check produces a clearer error message in CI.
        env:
          PYTHONPATH: src
        run: python scripts/gen_palette.py --check

      - name: Architecture-diagram drift guard (v0.17.2)
        # Fails if any src/atms/engines/*.py module isn't referenced
        # in the architecture diagram, or if docs/architecture.html
        # has drifted from the bundled template. Forces a diagram
        # update alongside every new engine.
        env:
          PYTHONPATH: src
        run: python scripts/check_architecture_drift.py --strict

      - name: JSON Schema drift guard (v0.18.63 Phase O)
        # Fails if docs/system.schema.json is stale vs. atms.models.System.
        # I.e. someone edited the Pydantic models but didn't re-run
        # `make schema`. Without this guard, VSCode users pinning the
        # canonical URL would silently get an outdated schema.
        env:
          PYTHONPATH: src
        run: python scripts/gen_schema.py --check

      - name: Run pytest
        run: python -m pytest tests -q

      - name: Run selftest (every bundled sample analyses cleanly)
        env:
          PYTHONPATH: src
        run: python -m atms.cli selftest

      - name: Lint with ruff (strict — Phase 6)
        # v0.18.48 Phase 6: was continue-on-error: true while debt was
        # paid down. Suite now passes cleanly (0 errors), so strict mode
        # is the gate from here on.
        run: ruff check src tests

  coverage:
    name: coverage floor (>= 86 percent line — Phase E)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install ATMS with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" coverage[toml]
      - name: Measure coverage
        env:
          PYTHONPATH: src
        run: |
          python -m pytest -q -m "not slow" -n auto --dist=loadfile \
              --cov --cov-report=term --cov-report=xml \
              --cov-fail-under=86
      - name: Upload coverage XML artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

  security:
    # v0.18.65 Phase Q — dependency CVE scan.
    #
    # pip-audit reads pyproject.toml's pinned runtime + dev deps and
    # cross-references them against the Python Packaging Advisory
    # Database (PYPA's curated list of known vulnerabilities) + OSV.
    # A new CVE in pydantic / fastapi / uvicorn / etc. surfaces here
    # the first time CI runs after disclosure.
    #
    # Non-blocking by default: pip-audit can flag deps that don't
    # have an available fix yet (e.g. zero-day in a transitive). The
    # `continue-on-error` lets contributors land code while the team
    # decides whether to pin/replace/wait. Set strict=true on the
    # job by removing that flag once dependencies stabilise.
    name: pip-audit (dependency CVEs)
    needs: test
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
      - name: Scan runtime + dev dependencies
        # `-l` (local) scans the venv we just built;
        # `--strict` makes warnings fatal (caught by continue-on-error).
        # We also explicitly tell pip-audit to read from pyproject.toml
        # so transitive deps come along.
        run: |
          pip install -e ".[dev]"
          pip-audit --strict --disable-pip || true

  wheel-verify:
    name: wheel installs cleanly + selftest passes
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: |
          python -m pip install --upgrade pip build
          python scripts/verify_wheel.py
        env:
          PYTHONPATH: src

  build-exe:
    name: Build portable .exe (Windows)
    runs-on: windows-latest
    needs: test
    # v0.18.72 Hibernation Phase 7 — the .exe distribution surface is
    # hibernated by default. The job stays defined so a one-line repo-
    # config flip (or a manual workflow_dispatch override) re-enables
    # it without touching this YAML. To re-enable for one tag push, set
    # the repository variable BUILD_EXE_ENABLED=true (Settings -> Secrets
    # and variables -> Actions -> Variables).
    if: |
      startsWith(github.ref, 'refs/tags/v')
      && vars.BUILD_EXE_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Build atms.exe
        run: python scripts/build_exe.py --clean

      - name: Smoke-test atms.exe
        shell: pwsh
        run: |
          .\dist\atms.exe version
          .\dist\atms.exe selftest

      - name: Upload atms.exe as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: atms-exe-${{ github.ref_name }}
          path: dist/atms.exe
          retention-days: 30

  build-installer:
    name: Build Inno Setup installer (Windows)
    runs-on: windows-latest
    needs: build-exe
    # v0.18.72 Hibernation Phase 7 — hibernated alongside build-exe.
    # Set the repo variable BUILD_INSTALLER_ENABLED=true to re-enable.
    if: |
      startsWith(github.ref, 'refs/tags/v')
      && vars.BUILD_INSTALLER_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: python scripts/build_installer.py --clean

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: atms-setup-${{ github.ref_name }}
          path: dist/ATMS-Setup-*.exe
          retention-days: 90

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/atms.exe
            dist/ATMS-Setup-*.exe
          draft: true
          generate_release_notes: true

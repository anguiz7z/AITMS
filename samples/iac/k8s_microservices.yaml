# Canonical Kubernetes sample — multi-doc manifests for a small webapp.
# Use:  atms scan samples/iac/k8s_microservices.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-frontend
  namespace: web
spec:
  replicas: 3
  selector:
    matchLabels: { app: web-frontend }
  template:
    metadata:
      labels: { app: web-frontend }
    spec:
      containers:
        - name: web
          image: nginx:1.27
          envFrom:
            - configMapRef: { name: web-config }
          volumeMounts:
            - name: tls
              mountPath: /etc/tls
      volumes:
        - name: tls
          secret: { secretName: web-tls }
---
apiVersion: v1
kind: Service
metadata:
  name: web-frontend
  namespace: web
spec:
  selector: { app: web-frontend }
  ports: [ { port: 443, targetPort: 8443 } ]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-ingress
  namespace: web
spec:
  rules:
    - host: example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: web-frontend, port: { number: 443 } }
---
apiVersion: v1
kind: Secret
metadata:
  name: web-tls
  namespace: web
type: kubernetes.io/tls
data:
  tls.crt: ""
  tls.key: ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: web-config
  namespace: web
data:
  LOG_LEVEL: info
  REGION: us-east-1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-worker
  namespace: web
spec:
  replicas: 2
  selector: { matchLabels: { app: api-worker } }
  template:
    metadata:
      labels: { app: api-worker }
    spec:
      serviceAccountName: api-sa
      containers:
        - name: worker
          image: registry.example.com/api:1.0.0
          envFrom:
            - secretRef: { name: db-credentials }
          volumeMounts:
            - name: scratch
              mountPath: /var/scratch
      volumes:
        - name: scratch
          persistentVolumeClaim: { claimName: scratch-pvc }
---
apiVersion: v1
kind: Service
metadata:
  name: api-worker
  namespace: web
spec:
  selector: { app: api-worker }
  ports: [ { port: 9090 } ]
---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: web
type: Opaque
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: scratch-pvc
  namespace: web
spec:
  accessModes: [ ReadWriteOnce ]
  resources: { requests: { storage: 5Gi } }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-sa
  namespace: web

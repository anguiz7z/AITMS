# Sample docker-compose.yml for ATMS IaC ingest (v0.14).
# Self-hosted RAG stack: web app → API → Postgres + pgvector + Vault + minio + observability.
# Run: atms ingest-iac samples/iac/docker-compose.yml --out drafted.yaml --analyze

name: rag-stack-sample

services:
  web:
    image: nginx:1.27
    ports: ["80:80", "443:443"]
    networks: [edge]

  api:
    image: ghcr.io/example-org/rag-api:1.4.2
    ports: ["8080:8080"]
    depends_on: [pg, vault, minio, ollama]
    networks: [edge, internal]
    environment:
      - DATABASE_URL=postgres://app@pg:5432/rag
      - VAULT_ADDR=http://vault:8200
      - OBJECT_STORE_URL=http://minio:9000
      - LLM_BASE_URL=http://ollama:11434

  ollama:
    image: ollama/ollama:0.5
    networks: [internal]

  pg:
    image: postgres:16
    environment: { POSTGRES_USER: app, POSTGRES_PASSWORD: changeme }
    networks: [internal]

  pgvector:
    image: pgvector/pgvector:pg16
    networks: [internal]

  vault:
    image: hashicorp/vault:1.18
    networks: [internal]

  minio:
    image: minio/minio:RELEASE.2025-01-01T00-00-00Z
    networks: [internal]

  prometheus:
    image: prom/prometheus:v2.55.0
    networks: [internal]

  grafana:
    image: grafana/grafana:11.3.0
    ports: ["3000:3000"]
    networks: [edge]

networks:
  edge:
  internal:

# MITRE ATT&CK — Cloud matrix (curated subset)
# Source: https://attack.mitre.org/matrices/enterprise/cloud/
#
# Curated specifically for AI workloads hosted in cloud (AWS / Azure / GCP).
# Each entry lists the technique, applicable cloud-AI component types, and
# keywords used by engines/cloud.py for keyword-based enrichment of threats.

# ───────────────────────────────────────────────── Initial Access (TA0001)
- id: T1078
  name: Valid Accounts
  tactics: [TA0001, TA0003, TA0004, TA0005]
  keywords: [valid account, credential, leaked key, stolen credential]
  applies_to: [iam_principal, api_gateway]
  description: Adversary uses legitimate credentials to gain initial access.

- id: T1078.004
  name: Valid Accounts — Cloud Accounts
  tactics: [TA0001, TA0003, TA0004, TA0005]
  keywords: [cloud account, iam user, service principal, leaked api key]
  applies_to: [iam_principal, api_gateway, secrets_vault]
  description: Adversary uses cloud-account credentials specifically (IAM user, service principal, GCP service account).

- id: T1190
  name: Exploit Public-Facing Application
  tactics: [TA0001]
  keywords: [exploit web app, ssrf, rce, public endpoint]
  applies_to: [api_gateway, serverless_function, container_runtime, llm_inference]
  description: Attacker exploits a vuln in a public-facing app/API to gain initial access.

- id: T1199
  name: Trusted Relationship
  tactics: [TA0001]
  keywords: [trusted relationship, third party, partner access, federation, oauth]
  applies_to: [iam_principal, api_gateway, external_api]
  description: Abuse of pre-existing trust relationships (federated identity, partner-OAuth, supply-chain integration).

# ───────────────────────────────────────────────── Execution (TA0002)
- id: T1059
  name: Command and Scripting Interpreter
  tactics: [TA0002]
  keywords: [shell, scripting, code execution, cli]
  applies_to: [serverless_function, container_runtime, agent, tool]
  description: Adversary executes commands via shells / scripts (cloud shell, lambda exec, kubectl exec).

- id: T1059.009
  name: Command and Scripting Interpreter — Cloud API
  tactics: [TA0002]
  keywords: [cloud api, aws cli, az cli, gcloud, programmatic access]
  applies_to: [iam_principal, serverless_function, container_runtime]
  description: Execution via the cloud provider's API or CLI directly.

# ───────────────────────────────────────────────── Persistence (TA0003)
- id: T1098
  name: Account Manipulation
  tactics: [TA0003, TA0004]
  keywords: [account manipulation, role attach, policy attach, credential add]
  applies_to: [iam_principal]
  description: Adversary manipulates accounts to maintain access.

- id: T1098.001
  name: Account Manipulation — Additional Cloud Credentials
  tactics: [TA0003, TA0004]
  keywords: [add credential, access key, second key, programmatic key]
  applies_to: [iam_principal, secrets_vault]
  description: Adversary adds an additional credential / access key to an existing account they control.

- id: T1098.003
  name: Account Manipulation — Additional Cloud Roles
  tactics: [TA0003, TA0004]
  keywords: [role attach, additional role, policy escalation]
  applies_to: [iam_principal]
  description: Adversary attaches additional roles or policies to an existing account.

- id: T1136.003
  name: Create Account — Cloud Account
  tactics: [TA0003]
  keywords: [create account, new iam user, new service account]
  applies_to: [iam_principal]
  description: Adversary creates a fresh cloud account / IAM user under their control for persistence.

- id: T1525
  name: Implant Internal Image
  tactics: [TA0003]
  keywords: [implant, container image, ami backdoor]
  applies_to: [container_runtime]
  description: Adversary implants a malicious container image (or AMI) used by future deployments.

# ───────────────────────────────────────────────── Privilege Escalation (TA0004)
- id: T1548
  name: Abuse Elevation Control Mechanism
  tactics: [TA0004]
  keywords: [privilege escalation, sudo, runas, elevated]
  applies_to: [iam_principal, serverless_function]
  description: Adversary escalates privileges via legitimate elevation mechanisms.

# ───────────────────────────────────────────────── Defense Evasion (TA0005)
- id: T1535
  name: Unused/Unsupported Cloud Regions
  tactics: [TA0005]
  keywords: [unused region, unmonitored region, eu-south-1]
  applies_to: [iam_principal, container_runtime]
  description: Adversary operates in cloud regions the defender doesn't monitor.

- id: T1578
  name: Modify Cloud Compute Infrastructure
  tactics: [TA0005]
  keywords: [modify compute, snapshot, vm image, infrastructure modification]
  applies_to: [container_runtime, serverless_function]
  description: Adversary alters cloud compute (snapshot, image) to avoid detection or maintain access.

# ───────────────────────────────────────────────── Credential Access (TA0006)
- id: T1552
  name: Unsecured Credentials
  tactics: [TA0006]
  keywords: [unsecured credential, hardcoded key, env var leak]
  applies_to: [iam_principal, secrets_vault, container_runtime, serverless_function]
  description: Adversary finds credentials stored insecurely (config, env, code, blob).

- id: T1552.001
  name: Unsecured Credentials — Credentials In Files
  tactics: [TA0006]
  keywords: [credentials in files, .env, terraform.tfvars, config leak]
  applies_to: [object_storage, container_runtime]
  description: Credentials stored in files reachable by the adversary.

- id: T1552.005
  name: Unsecured Credentials — Cloud Instance Metadata API
  tactics: [TA0006]
  keywords: [imds, instance metadata, 169.254.169.254, metadata endpoint]
  applies_to: [serverless_function, container_runtime, api_gateway]
  description: Adversary queries the cloud-instance-metadata API to steal short-term credentials. SSRF often the entry path.

- id: T1528
  name: Steal Application Access Token
  tactics: [TA0006]
  keywords: [oauth token, application token, refresh token, bearer]
  applies_to: [iam_principal, api_gateway]
  description: Adversary steals OAuth / application access tokens.

- id: T1539
  name: Steal Web Session Cookie
  tactics: [TA0006]
  keywords: [session cookie, jwt theft, xss cookie steal]
  applies_to: [api_gateway, llm_inference]
  description: Adversary steals web session cookies / JWTs (XSS, MITM, malware).

# ───────────────────────────────────────────────── Discovery (TA0007)
- id: T1526
  name: Cloud Service Discovery
  tactics: [TA0007]
  keywords: [cloud service discovery, list services, enumeration]
  applies_to: [iam_principal, container_runtime]
  description: Adversary enumerates cloud services to plan further actions.

- id: T1538
  name: Cloud Service Dashboard
  tactics: [TA0007]
  keywords: [console access, cloud dashboard]
  applies_to: [iam_principal]
  description: Adversary uses the cloud console (web UI) for discovery.

- id: T1580
  name: Cloud Infrastructure Discovery
  tactics: [TA0007]
  keywords: [infrastructure discovery, vpc enumeration, resource list]
  applies_to: [iam_principal, network_segment]
  description: Adversary enumerates infrastructure (VPCs, subnets, instances).

- id: T1518
  name: Software Discovery
  tactics: [TA0007]
  keywords: [software discovery, installed packages]
  applies_to: [container_runtime, serverless_function]
  description: Adversary discovers what software is installed (helpful for choosing exploits).

# ───────────────────────────────────────────────── Collection (TA0009)
- id: T1530
  name: Data from Cloud Storage Object
  tactics: [TA0009]
  keywords: [data from storage, s3 read, blob read, gcs object, bucket dump]
  applies_to: [object_storage]
  description: Adversary reads data from cloud object storage.

- id: T1213
  name: Data from Information Repositories
  tactics: [TA0009]
  keywords: [information repositories, wiki, sharepoint, confluence, codebase]
  applies_to: [data_source, object_storage]
  description: Adversary collects data from internal info repositories (often a RAG ingestion source).

- id: T1119
  name: Automated Collection
  tactics: [TA0009]
  keywords: [automated collection, scripted exfil, batch export]
  applies_to: [object_storage, message_queue]
  description: Adversary scripts large-scale collection of data.

# ───────────────────────────────────────────────── Command and Control (TA0011)
- id: T1102
  name: Web Service
  tactics: [TA0011]
  keywords: [c2 over web service, github c2, slack c2]
  applies_to: [serverless_function, container_runtime]
  description: Adversary uses legitimate web services for C2 (GitHub Pages, S3, etc.).

# ───────────────────────────────────────────────── Exfiltration (TA0010)
- id: T1567
  name: Exfiltration Over Web Service
  tactics: [TA0010]
  keywords: [exfil, web service exfil, dropbox, transfer.sh]
  applies_to: [object_storage, container_runtime, serverless_function]
  description: Adversary exfiltrates data via a legitimate web service.

# ───────────────────────────────────────────────── Impact (TA0040)
- id: T1485
  name: Data Destruction
  tactics: [TA0040]
  keywords: [data destruction, delete data, wipe]
  applies_to: [object_storage, message_queue, observability_stack]
  description: Adversary destroys data — often after exfil to cover tracks.

- id: T1486
  name: Data Encrypted for Impact
  tactics: [TA0040]
  keywords: [ransomware, data encrypted, kms ransom]
  applies_to: [object_storage, kms_key, container_runtime]
  description: Adversary encrypts data (or revokes legitimate KMS keys) for ransom.

- id: T1496
  name: Resource Hijacking
  tactics: [TA0040]
  keywords: [cryptojacking, resource hijack, gpu mining, llm abuse]
  applies_to: [container_runtime, serverless_function, llm_inference, api_gateway]
  description: Adversary uses your compute for their own purposes (cryptomining, abuse of paid LLMs).

- id: T1499
  name: Endpoint Denial of Service
  tactics: [TA0040]
  keywords: [dos, denial of service, request flood]
  applies_to: [api_gateway, llm_inference, serverless_function]
  description: Adversary exhausts a service endpoint, denying legitimate use.

- id: T1565
  name: Data Manipulation
  tactics: [TA0040]
  keywords: [data manipulation, integrity attack, alter content]
  applies_to: [object_storage, observability_stack, message_queue]
  description: Adversary alters data to mislead applications or operators.

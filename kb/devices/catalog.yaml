# ATMS device & product catalog (v0.11)
# Curated list of real, currently-deployed products keyed by ATMS component
# type. Surfaced as a vendor / product / version picker inside the GUI editor
# (writes selections into `component.metadata.vendor / .product / .version`).
#
# Entry schema:
#   id:        stable snake_case key (used by code)
#   vendor:    vendor / project / publisher
#   product:   product / service name
#   category:  ATMS component_type (one of the 40)
#   versions:  list of version strings the user can pick
#   description: one short line
#   os:        host OS family if relevant ('cloud' for SaaS / managed)
#   notes:     optional caveats / hardening hints
#
# Curated 2026-05-09. Versions reflect what's currently in production /
# vendor-supported as of that date. Entries are illustrative — the catalogue
# is meant to give users a head-start on labelling, not to be exhaustive.


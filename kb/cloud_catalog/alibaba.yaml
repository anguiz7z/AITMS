# ATMS Alibaba Cloud service catalog (v0.16.0)
# -------------------------------------------------------------------------
# Canonical list of Alibaba Cloud (Aliyun) services for ATMS threat models.
# Each entry maps a vendor service to an ATMS ComponentType so the engine
# can apply the correct STRIDE / MAESTRO / OWASP-LLM / OWASP-Agentic
# playbooks automatically when a user picks the service in the GUI editor.
#
# Schema documented in kb/cloud_catalog/azure.yaml.
# -------------------------------------------------------------------------

# ────────────────────────── Compute ────────────────────────────────────────
- vendor: Alibaba
  product: ecs
  display_name: Alibaba Elastic Compute Service (ECS)
  component_type: cloud_compute
  service_category: compute
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://www.alibabacloud.com/help/en/ecs/
  ai_context: |
    General-purpose VMs (incl. GPU shapes — gn7, ebmgn7) hosting self-
    managed inference, fine-tuning and agent runtimes. RAM role attached
    to ECS instance is the identity the workload uses to reach OSS / RDS
    — over-broad role policy is the leading pivot.

- vendor: Alibaba
  product: ack
  display_name: Alibaba Container Service for Kubernetes (ACK)
  component_type: container_orchestrator
  service_category: compute
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://www.alibabacloud.com/help/en/ack/
  ai_context: |
    Managed Kubernetes — primary host for KServe, vLLM and PAI-EAS-on-K8s.
    RRSA (RAM Roles for Service Accounts) is the workload identity pattern
    that keeps tool containers least-privileged.

- vendor: Alibaba
  product: container_registry
  display_name: Alibaba Container Registry (ACR)
  component_type: container_registry
  service_category: compute
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://www.alibabacloud.com/help/en/acr/
  ai_context: |
    Holds inference / agent images. EE-tier supports signing, image scanning
    and global replication — critical for cross-region AI deployment.

- vendor: Alibaba
  product: function_compute
  display_name: Alibaba Function Compute (FC)
  component_type: serverless_function
  service_category: compute
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://www.alibabacloud.com/help/en/fc/
  ai_context: |
    Serverless functions — common back-end for LLM tool calls and Model
    Studio plugins. FC's GPU instances also serve lightweight inference.

- vendor: Alibaba
  product: sae
  display_name: Alibaba Serverless App Engine (SAE)
  component_type: container_runtime
  service_category: compute
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://www.alibabacloud.com/help/en/sae/
  ai_context: |
    Serverless Spring Cloud / Dubbo / containers. Sometimes used for
    AI orchestration apps written in Java.

- vendor: Alibaba
  product: eci
  display_name: Alibaba Elastic Container Instance (ECI)
  component_type: container_runtime
  service_category: compute
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://www.alibabacloud.com/help/en/eci/
  ai_context: |
    Cluster-less container instances — common backing for ACK virtual node
    autoscaling on AI workloads with spiky demand.

- vendor: Alibaba
  product: ebm
  display_name: Alibaba Elastic Bare Metal (EBM)
  component_type: cloud_compute
  service_category: compute
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://www.alibabacloud.com/help/en/ebm/
  ai_context: |
    Bare metal GPU hosts for large-model fine-tuning where hypervisor
    overhead is unacceptable.

# ────────────────────────── Storage ───────────────────────────────────────
- vendor: Alibaba
  product: oss
  display_name: Alibaba Object Storage Service (OSS)
  component_type: object_storage
  service_category: storage
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://www.alibabacloud.com/help/en/oss/
  ai_context: |
    Primary corpus / model-weights / chat-log store. Public-read buckets
    and over-broad STS tokens are the leading cause of training-data leak
    on Alibaba Cloud — the equivalent of the public-S3-bucket problem.

- vendor: Alibaba
  product: nas
  display_name: Alibaba Apsara File Storage (NAS)
  component_type: file_storage
  service_category: storage
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://www.alibabacloud.com/help/en/nas/
  ai_context: |
    NFS/SMB shared file system mounted across ACK pods for shared model
    weights and tokenizer files.

- vendor: Alibaba
  product: ebs
  display_name: Alibaba Elastic Block Storage (ESSD / EBS)
  component_type: block_storage
  service_category: storage
  applies_to_ai_workflows: false
  threats_specific: []
  references:
    - https://www.alibabacloud.com/help/en/ecs/user-guide/block-storage-overview
  ai_context: |
    Persistent block storage for GPU ECS. CMK encryption via KMS protects
    weights at rest.

- vendor: Alibaba
  product: hbr
  display_name: Alibaba Hybrid Backup Recovery (HBR)
  component_type: backup_service
  service_category: storage
  applies_to_ai_workflows: false
  threats_specific: []
  references:
    - https://www.alibabacloud.com/help/en/hbr/
  ai_context: |
    Backup of ECS, NAS, OSS and on-prem servers. Immutable snapshots
    protect AI training data from ransomware.

- vendor: Alibaba
  product: oss_hdfs
  display_name: Alibaba OSS-HDFS (JindoFS)
  component_type: data_lake
  service_category: storage
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://www.alibabacloud.com/help/en/oss/user-guide/oss-hdfs-overview
  ai_context: |
    HDFS-compatible namespace on top of OSS — substrate for E-MapReduce and
    MaxCompute lakehouse use including AI feature pipelines.


- vendor: AWS
  product: route53
  display_name: Amazon Route 53
  component_type: dns_service
  service_category: network
  applies_to_ai_workflows: false
  references:
    - https://aws.amazon.com/route53/
  ai_context: |
    Public/private DNS; dangling records can be hijacked to spoof tool

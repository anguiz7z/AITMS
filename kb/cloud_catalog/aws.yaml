# ATMS Cloud Service Catalog — AWS
# Maps canonical AWS service IDs to ATMS ComponentType so users can declare
# metadata: {vendor: AWS, product: <id>} and inherit threats + classification.
# Matching is case-insensitive on both vendor and product.

# ---------------------------------------------------------------------------
# Compute
# ---------------------------------------------------------------------------
- vendor: AWS
  product: ec2
  display_name: Amazon EC2
  component_type: cloud_compute
  service_category: compute
  applies_to_ai_workflows: true
  threats_specific:
    - T_AWS_EC2_001
  references:
    - https://aws.amazon.com/ec2/
  ai_context: |
    Hosts self-managed LLM inference servers, vLLM/TGI workers, and agent
    runtimes. IMDSv1 + over-broad IAM role on the instance is the canonical
    SSRF-to-cloud-creds escalation path for agentic tools that fetch URLs.

- vendor: AWS
  product: ecs
  display_name: Amazon ECS
  component_type: container_orchestrator
  service_category: compute
  applies_to_ai_workflows: true
  threats_specific:
    - T_AWS_ECS_001
  references:
    - https://aws.amazon.com/ecs/
  ai_context: |
    Common landing zone for containerized model servers and tool sidecars.
    Task-role over-permissioning lets a compromised tool container reach
    DynamoDB/S3 of unrelated tenants.

- vendor: AWS
  product: eks
  display_name: Amazon EKS
  component_type: container_orchestrator
  service_category: compute
  applies_to_ai_workflows: true
  threats_specific:
    - T_AWS_EKS_001
  references:
    - https://aws.amazon.com/eks/
  ai_context: |
    Hosts multi-tenant LLM platforms; IRSA mis-scoping and pod-to-pod lateral
    movement enable cross-namespace prompt/embedding theft.

- vendor: AWS
  product: fargate
  display_name: AWS Fargate
  component_type: serverless_function
  service_category: compute
  applies_to_ai_workflows: true
  references:
    - https://aws.amazon.com/fargate/
  ai_context: |
    Serverless container runtime for agents/tools; ephemeral, but task-role
    scope determines blast radius when a tool gets prompt-injected.

- vendor: AWS
  product: lambda
  display_name: AWS Lambda
  component_type: serverless_function
  service_category: compute
  applies_to_ai_workflows: true
  threats_specific:
    - T_AWS_LAMBDA_001
  references:
    - https://aws.amazon.com/lambda/
  ai_context: |
    Most common ATMS tool runtime. Execution-role permissions become the
    agent's effective authority; lack of per-tool scoping = confused-deputy.

- vendor: AWS
  product: lambda_at_edge
  display_name: Lambda@Edge
  component_type: edge_compute
  service_category: compute
  applies_to_ai_workflows: false
  references:
    - https://docs.aws.amazon.com/lambda/latest/dg/lambda-edge.html
  ai_context: |
    Edge request/response mutation; rarely AI-bearing but can inject prompts
    into upstream Bedrock-backed APIs if abused.

- vendor: AWS
  product: batch
  display_name: AWS Batch
  component_type: batch_compute
  service_category: compute
  applies_to_ai_workflows: true
  references:
    - https://aws.amazon.com/batch/
  ai_context: |
    Runs large-scale training/eval jobs; job-definition envs often contain
    HF tokens or S3 dataset URIs that leak via logs.

- vendor: AWS
  product: outposts
  display_name: AWS Outposts
  component_type: cloud_compute
  service_category: compute
  applies_to_ai_workflows: false
  references:
    - https://aws.amazon.com/outposts/
  ai_context: |
    On-prem AWS rack; relevant when data-residency rules force LLM inference
    to stay in-country (SG, EU).

- vendor: AWS
  product: wavelength
  display_name: AWS Wavelength
  component_type: edge_compute
  service_category: compute
  applies_to_ai_workflows: false
  references:
    - https://aws.amazon.com/wavelength/
  ai_context: |
    5G/MEC edge; low-latency inference for mobile agents — same IMDS/role
    risks as EC2 but at the carrier edge.

- vendor: AWS
  product: local_zones
  display_name: AWS Local Zones
  component_type: edge_compute
  service_category: compute
  applies_to_ai_workflows: false
  references:
    - https://aws.amazon.com/about-aws/global-infrastructure/localzones/
  ai_context: |
    Metro-area extension of a Region; same IAM/network model as parent
    Region, used for latency-sensitive inference.

# ---------------------------------------------------------------------------
# Storage
# ---------------------------------------------------------------------------
- vendor: AWS
  product: s3
  display_name: Amazon S3
  component_type: object_storage
  service_category: storage
  applies_to_ai_workflows: true
  threats_specific:
    - T_AWS_S3_001
  references:
    - https://aws.amazon.com/s3/
  ai_context: |
    The default RAG corpus, training-dataset, and model-weight store.
    Public-read bucket + indirect prompt injection in PDFs = poisoning at
    scale. Pre-signed URLs in tool outputs are a common exfil channel.

- vendor: AWS
  product: ebs
  display_name: Amazon EBS
  component_type: block_storage
  service_category: storage
  applies_to_ai_workflows: false
  references:
    - https://aws.amazon.com/ebs/
  ai_context: |
    Block volumes attached to GPU instances; unencrypted snapshots shared
    across accounts leak proprietary fine-tuned weights.

- vendor: AWS
  product: efs
  display_name: Amazon EFS
  component_type: file_storage
  service_category: storage
  applies_to_ai_workflows: true
  references:
    - https://aws.amazon.com/efs/
  ai_context: |
    Shared filesystem for distributed training and SageMaker notebooks;
    POSIX permissions misconfig = cross-team dataset leakage.

- vendor: AWS
  product: fsx_netapp
  display_name: Amazon FSx for NetApp ONTAP
  component_type: file_storage
  service_category: storage
  applies_to_ai_workflows: false
  references:
    - https://aws.amazon.com/fsx/netapp-ontap/
  ai_context: |
    Enterprise NAS often holding the documents fed into a RAG ingestion
    pipeline; export-policy laxity leaks corporate docs to indexing jobs.

- vendor: AWS
  product: fsx_windows
  display_name: Amazon FSx for Windows File Server
  component_type: file_storage
  service_category: storage
  applies_to_ai_workflows: false
  references:
    - https://aws.amazon.com/fsx/windows/
  ai_context: |
    SMB share for Windows workloads; rarely directly AI-bearing unless used
    as a corpus source for enterprise search.

- vendor: AWS
  product: fsx_lustre
  display_name: Amazon FSx for Lustre
  component_type: file_storage
  service_category: storage
  applies_to_ai_workflows: true
  references:
    - https://aws.amazon.com/fsx/lustre/
  ai_context: |
    High-throughput parallel FS for ML training; mount-target ACL bypass
    grants raw dataset access to unrelated training jobs.

- vendor: AWS
  product: fsx_openzfs
  display_name: Amazon FSx for OpenZFS
  component_type: file_storage
  service_category: storage
  applies_to_ai_workflows: false
  references:
    - https://aws.amazon.com/fsx/openzfs/
  ai_context: |
    NFS for Linux ML workloads; snapshot exposure leaks training artifacts.

- vendor: AWS
  product: storage_gateway
  display_name: AWS Storage Gateway
  component_type: file_storage
  service_category: storage
  applies_to_ai_workflows: false
  references:
    - https://aws.amazon.com/storagegateway/
  ai_context: |
    Hybrid bridge to S3; can be a sneaky path for on-prem PII to land in
    RAG corpora without DLP review.

- vendor: AWS
  product: backup
  display_name: AWS Backup
  component_type: backup_service
  service_category: storage
  applies_to_ai_workflows: false
  references:
    - https://aws.amazon.com/backup/
  ai_context: |
    Centralized backup; vault-lock misconfig means a prompt-injected agent
    with backup:DeleteRecoveryPoint can destroy retention.

- vendor: AWS
  product: glacier
  display_name: Amazon S3 Glacier
  component_type: object_storage
  service_category: storage
  applies_to_ai_workflows: false
  references:
    - https://aws.amazon.com/s3/storage-classes/glacier/
  ai_context: |
    Cold archive; old training data here may still violate GDPR right-to-
    erasure if not catalogued.

- vendor: AWS
  product: datasync
  display_name: AWS DataSync
  component_type: etl_orchestrator
  service_category: storage
  applies_to_ai_workflows: true
  references:
    - https://aws.amazon.com/datasync/
  ai_context: |
    On-prem -> S3 mover; the unaudited path that drops raw HR/finance docs
    into a RAG bucket.

# ---------------------------------------------------------------------------
# Database
# ---------------------------------------------------------------------------
- vendor: AWS
  product: rds
  display_name: Amazon RDS
  component_type: database
  service_category: database
  applies_to_ai_workflows: true
  threats_specific:
    - T_AWS_RDS_001
  references:
    - https://aws.amazon.com/rds/
  ai_context: |
    Often the source of truth queried by agent SQL-tools. SQL injection via
    LLM-generated queries + over-broad DB user = full table read.

- vendor: AWS
  product: rds_mysql
  display_name: Amazon RDS for MySQL
  component_type: database
  service_category: database
  applies_to_ai_workflows: true
  references:
    - https://aws.amazon.com/rds/mysql/
  ai_context: |
    Classic backend for agent SQL tools; prompt-injected SELECT * FROM users
    is the canonical risk.

- vendor: AWS
  product: rds_postgres
  display_name: Amazon RDS for PostgreSQL
  component_type: database
  service_category: database
  applies_to_ai_workflows: true
  references:
    - https://aws.amazon.com/rds/postgresql/
  ai_context: |
    With pgvector, doubles as vector store for RAG; same agent-SQL-tool
    injection risks plus embedding poisoning.

- vendor: AWS
  product: rds_oracle
  display_name: Amazon RDS for Oracle
  component_type: database
  service_category: database
  applies_to_ai_workflows: true
  references:
    - https://aws.amazon.com/rds/oracle/
  ai_context: |
    Enterprise OLTP source for agentic data-lookup tools; PL/SQL injection
    via generated queries is the chief risk.

- vendor: AWS
  product: rds_sqlserver
  display_name: Amazon RDS for SQL Server
  component_type: database
  service_category: database
  applies_to_ai_workflows: true
  references:
    - https://aws.amazon.com/rds/sqlserver/
  ai_context: |
    Microsoft-stack OLTP source for agent tools; xp_cmdshell escalation
    risk if the agent's DB user has sysadmin.

- vendor: AWS
  product: aurora
  display_name: Amazon Aurora
  component_type: database
  service_category: database
  applies_to_ai_workflows: true
  references:
    - https://aws.amazon.com/rds/aurora/
  ai_context: |
    Aurora-pgvector is a common RAG store. Cluster snapshot sharing leaks
    proprietary embeddings.

- vendor: AWS
  product: dynamodb
  display_name: Amazon DynamoDB
  component_type: nosql_database
  service_category: database
  applies_to_ai_workflows: true
  threats_specific:
    - T_AWS_DYNAMODB_001
  references:
    - https://aws.amazon.com/dynamodb/
  ai_context: |
    Standard store for agent chat history and tool-call sessionAttributes;
    cross-tenant pollution via weak partition keys is the canonical
    multi-tenant LLM-platform risk.

- vendor: AWS
  product: documentdb
  display_name: Amazon DocumentDB
  component_type: nosql_database
  service_category: database
  applies_to_ai_workflows: true
  references:
    - https://aws.amazon.com/documentdb/
  ai_context: |
    Mongo-compatible store; sometimes holds agent transcripts. NoSQL injection
    via LLM-built filters can break tenant isolation.

- vendor: AWS
  product: neptune
  display_name: Amazon Neptune
  component_type: graph_database
  service_category: database
  applies_to_ai_workflows: true
  references:
    - https://aws.amazon.com/neptune/
  ai_context: |
    Knowledge-graph backend for GraphRAG; prompt-built Gremlin/SPARQL can
    enumerate relationships across tenants.

- vendor: AWS
  product: memorydb
  display_name: Amazon MemoryDB for Redis
  component_type: cache_store
  service_category: database
  applies_to_ai_workflows: true
  references:
    - https://aws.amazon.com/memorydb/
  ai_context: |
    Durable Redis used for session memory and prompt caching; ACL bypass =
    cross-session prompt/response leakage.

- vendor: AWS
  product: timestream
  display_name: Amazon Timestream
  component_type: time_series_database
  service_category: database
  applies_to_ai_workflows: false
  references:
    - https://aws.amazon.com/timestream/
  ai_context: |
    Time-series store; relevant when AI ops telemetry (token cost, latency)
    is queried by agents — can leak per-customer cost patterns.

- vendor: AWS
  product: elasticache
  display_name: Amazon ElastiCache
  component_type: cache_store
  service_category: database
  applies_to_ai_workflows: true
  references:
    - https://aws.amazon.com/elasticache/
  ai_context: |
    Common prompt/response cache; weak auth + shared key namespace = cache
    poisoning between tenants.

- vendor: AWS
  product: redshift
  display_name: Amazon Redshift
  component_type: data_warehouse
  service_category: database
  applies_to_ai_workflows: true
  references:
    - https://aws.amazon.com/redshift/
  ai_context: |
    Analytics warehouse queried by agent BI tools; over-granted role on the
    Redshift Data API leaks customer cohort PII via text-to-SQL.

- vendor: AWS
  product: athena
  display_name: Amazon Athena
  component_type: data_warehouse
  service_category: database
  applies_to_ai_workflows: true
  references:
    - https://aws.amazon.com/athena/
  ai_context: |
    Serverless SQL over S3; agent SQL tools frequently expose this and can
    exfiltrate any data-lake table the workgroup role can read.

- vendor: AWS
  product: keyspaces
  display_name: Amazon Keyspaces (Cassandra)
  component_type: nosql_database
  service_category: database
  applies_to_ai_workflows: false
  references:
    - https://aws.amazon.com/keyspaces/
  ai_context: |
    Wide-column store; relevant when agent transcripts are stored at scale.

- vendor: AWS
  product: qldb
  display_name: Amazon QLDB
  component_type: database
  service_category: database
  applies_to_ai_workflows: false
  references:
    - https://aws.amazon.com/qldb/
  ai_context: |
    Immutable ledger; useful for audit-grade logging of agent tool calls
    (deprecated July 2025 but still present in legacy stacks).


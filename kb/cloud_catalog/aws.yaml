- vendor: AWS
  product: global_accelerator
  display_name: AWS Global Accelerator
  component_type: load_balancer
  service_category: network
  applies_to_ai_workflows: false
  references:
    - https://aws.amazon.com/global-accelerator/
  ai_context: |
    Anycast front door; usually upstream of LLM APIs but not itself AI-
    bearing.

- vendor: AWS
  product: cloudfront
  display_name: Amazon CloudFront
  component_type: cdn
  service_category: network
  applies_to_ai_workflows: false
  references:
    - https://aws.amazon.com/cloudfront/
  ai_context: |
    CDN in front of agent UIs; cache poisoning can serve attacker prompts
    to all users of a chatbot.

- vendor: AWS
  product: elb
  display_name: Elastic Load Balancing
  component_type: load_balancer
  service_category: network
  applies_to_ai_workflows: false
  references:
    - https://aws.amazon.com/elasticloadbalancing/
  ai_context: |
    Public-facing ALB/NLB in front of inference endpoints; missing WAF/
    rate-limit makes prompt-cost DoS trivial.


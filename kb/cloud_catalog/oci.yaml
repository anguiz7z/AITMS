# ATMS Oracle Cloud Infrastructure (OCI) service catalog (v0.16.0)
# -------------------------------------------------------------------------
# Canonical list of OCI services for ATMS threat models. Each entry maps a
# vendor service to an ATMS ComponentType so the engine can apply the
# correct STRIDE / MAESTRO / OWASP-LLM / OWASP-Agentic playbooks
# automatically when a user picks the service in the GUI editor.
#
# Schema documented in kb/cloud_catalog/azure.yaml.
# -------------------------------------------------------------------------

# ────────────────────────── Compute ────────────────────────────────────────
- vendor: OCI
  product: compute_vm
  display_name: OCI Compute (Virtual Machines)
  component_type: cloud_compute
  service_category: compute
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://docs.oracle.com/en-us/iaas/Content/Compute/home.htm
  ai_context: |
    General-purpose VM shapes hosting self-managed inference and agent
    runtimes. Tenant owns OS patching, kernel hardening and outbound egress
    where the model is invoked.

- vendor: OCI
  product: compute_bare_metal
  display_name: OCI Compute Bare Metal
  component_type: cloud_compute
  service_category: compute
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://docs.oracle.com/en-us/iaas/Content/Compute/References/computeshapes.htm
  ai_context: |
    Physical hosts (BM.GPU shapes with NVIDIA A100 / H100 / B200) — the
    primary OCI surface for fine-tuning large open-weight models. Single-
    tenant hardware removes co-tenant side-channel risk.

- vendor: OCI
  product: compute_hpc
  display_name: OCI Compute HPC (RDMA cluster networks)
  component_type: high_performance_compute
  service_category: compute
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://docs.oracle.com/en-us/iaas/Content/Compute/References/computeshapes.htm
  ai_context: |
    RoCE v2 / RDMA cluster networking for multi-node distributed training.
    Cluster network ACLs are the segmentation primitive between training
    jobs from different teams.

- vendor: OCI
  product: oke
  display_name: OCI Container Engine for Kubernetes (OKE)
  component_type: container_orchestrator
  service_category: compute
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://docs.oracle.com/en-us/iaas/Content/ContEng/home.htm
  ai_context: |
    Managed Kubernetes — common host for KServe, vLLM and Triton on OCI.
    Workload identity via OCI IAM dynamic groups is the right control for
    pod-level access to Object Storage and Vault.

- vendor: OCI
  product: functions
  display_name: OCI Functions
  component_type: serverless_function
  service_category: compute
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://docs.oracle.com/en-us/iaas/Content/Functions/home.htm
  ai_context: |
    Fn Project-based FaaS. Frequently invoked as the back-end of LLM tool
    calls — function-level IAM policy is the privilege boundary.

- vendor: OCI
  product: container_instances
  display_name: OCI Container Instances
  component_type: container_runtime
  service_category: compute
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://docs.oracle.com/en-us/iaas/Content/container-instances/home.htm
  ai_context: |
    Serverless containers without cluster overhead. Useful for short-lived
    MCP servers and sandboxed code-execution tools.

- vendor: OCI
  product: compute_cloud_at_customer
  display_name: OCI Compute Cloud@Customer
  component_type: cloud_compute
  service_category: compute
  applies_to_ai_workflows: false
  threats_specific: []
  references:
    - https://docs.oracle.com/en-us/iaas/Content/compute-cloud-at-customer/home.htm
  ai_context: |
    OCI-managed rack inside the customer data centre. Useful for regulated
    AI workloads that must stay on-prem (sovereign clouds).

- vendor: OCI
  product: dedicated_region
  display_name: OCI Dedicated Region
  component_type: cloud_compute
  service_category: compute
  applies_to_ai_workflows: false
  threats_specific: []
  references:
    - https://www.oracle.com/cloud/cloud-at-customer/dedicated-region/
  ai_context: |
    Full OCI region installed in the customer's facility. Provides full
    Generative AI stack with sovereignty guarantees.

# ────────────────────────── Storage ───────────────────────────────────────
- vendor: OCI
  product: object_storage
  display_name: OCI Object Storage
  component_type: object_storage
  service_category: storage
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://docs.oracle.com/en-us/iaas/Content/Object/home.htm
  ai_context: |
    Primary corpus / model-weights / chat-log store on OCI. Pre-Authenticated
    Requests (PARs) are the OCI equivalent of S3 presigned URLs — over-broad
    PAR scope is a leading cause of training-data leakage.

- vendor: OCI
  product: file_storage
  display_name: OCI File Storage
  component_type: file_storage
  service_category: storage
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://docs.oracle.com/en-us/iaas/Content/File/home.htm
  ai_context: |
    NFSv3/v4 shared file system. Mounted across OKE pods for shared model
    weights and prompt templates.

- vendor: OCI
  product: block_volumes
  display_name: OCI Block Volumes
  component_type: block_storage
  service_category: storage
  applies_to_ai_workflows: false
  threats_specific: []
  references:
    - https://docs.oracle.com/en-us/iaas/Content/Block/home.htm
  ai_context: |
    Persistent block storage for GPU VMs. Customer-managed keys via Vault
    bound at attach time.

- vendor: OCI
  product: backup
  display_name: OCI Backup (Block / Boot Volumes / Object Storage replication)
  component_type: backup_service
  service_category: storage
  applies_to_ai_workflows: false
  threats_specific: []
  references:
    - https://docs.oracle.com/en-us/iaas/Content/Block/Concepts/blockvolumebackups.htm
  ai_context: |
    Backups of model weights and training checkpoints. Replication policies
    can cross regions — flag for data-residency review.

- vendor: OCI
  product: storage_gateway
  display_name: OCI Storage Gateway
  component_type: file_storage
  service_category: storage
  applies_to_ai_workflows: false
  threats_specific: []
  references:
    - https://docs.oracle.com/en-us/iaas/Content/StorageGateway/home.htm
  ai_context: |
    NFS-to-Object-Storage gateway for on-prem hybrid use. Caching layer is
    a potential exfiltration pivot if the gateway VM is compromised.


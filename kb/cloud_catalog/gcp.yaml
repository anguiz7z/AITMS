  ai_context: |
    Block volumes attached to GCE/TPU nodes; unencrypted snapshots shared
    cross-project leak proprietary weights.

- vendor: GCP
  product: filestore
  display_name: Filestore
  component_type: file_storage
  service_category: storage
  applies_to_ai_workflows: true
  references:
    - https://cloud.google.com/filestore
  ai_context: |
    NFS for ML training jobs; weak share-level controls let unrelated
    training pods read the same dataset volume.

- vendor: GCP
  product: backup_and_dr

# ATMS Cloud Service Catalog — Google Cloud
# Maps canonical GCP service IDs to ATMS ComponentType so users can declare
# metadata: {vendor: GCP, product: <id>} and inherit threats + classification.
# Matching is case-insensitive on both vendor and product.

# ---------------------------------------------------------------------------
# Compute
# ---------------------------------------------------------------------------
- vendor: GCP
  product: compute_engine
  display_name: Google Compute Engine
  component_type: cloud_compute
  service_category: compute
  applies_to_ai_workflows: true
  threats_specific:
    - T_GCP_GCE_001
  references:
    - https://cloud.google.com/compute
  ai_context: |
    Hosts self-managed LLM inference (vLLM, TGI) and agent runtimes on
    GPUs/TPUs. Default service account on the VM + metadata server SSRF =
    canonical token-theft path for prompt-injected agentic URL fetchers.

- vendor: GCP
  product: gke
  display_name: Google Kubernetes Engine
  component_type: container_orchestrator
  service_category: compute
  applies_to_ai_workflows: true
  references:
    - https://cloud.google.com/kubernetes-engine
  ai_context: |
    Hosts multi-tenant LLM platforms. Workload Identity mis-binding and
    weak NetworkPolicy enable pod-to-pod lateral movement and cross-
    namespace prompt/embedding theft.

- vendor: GCP
  product: gke_autopilot
  display_name: GKE Autopilot
  component_type: container_orchestrator
  service_category: compute
  applies_to_ai_workflows: true
  references:
    - https://cloud.google.com/kubernetes-engine/docs/concepts/autopilot-overview
  ai_context: |
    Managed-node GKE; hardened defaults but Workload Identity still
    governs how agent pods touch BigQuery/GCS.

- vendor: GCP
  product: cloud_run
  display_name: Cloud Run
  component_type: serverless_function
  service_category: compute
  applies_to_ai_workflows: true
  references:
    - https://cloud.google.com/run
  ai_context: |
    Serverless container runtime — popular for agent + tool services.
    Service-account permissions become the agent's effective authority;
    per-service identities are the must-have control.

- vendor: GCP
  product: cloud_functions
  display_name: Cloud Functions
  component_type: serverless_function
  service_category: compute
  applies_to_ai_workflows: true
  references:
    - https://cloud.google.com/functions
  ai_context: |
    GCP equivalent of Lambda for agent tools; over-scoped runtime SA is
    the dominant confused-deputy source.

- vendor: GCP
  product: cloud_build
  display_name: Cloud Build
  component_type: build_runner
  service_category: compute
  applies_to_ai_workflows: true
  references:
    - https://cloud.google.com/build
  ai_context: |
    Builds container images for model servers; supply-chain attacks here
    inject backdoors that ship straight to inference pods.

- vendor: GCP
  product: anthos
  display_name: Anthos
  component_type: container_orchestrator
  service_category: compute
  applies_to_ai_workflows: false
  references:
    - https://cloud.google.com/anthos
  ai_context: |
    Hybrid/multi-cloud Kubernetes; relevant when LLM workloads must run
    on-prem for data-residency reasons.


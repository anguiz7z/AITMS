# ATMS Azure cloud service catalog (v0.16.0)
# -------------------------------------------------------------------------
# Canonical list of Microsoft Azure services that may appear inside ATMS
# threat models. Each entry maps a vendor service to an ATMS ComponentType
# so that the engine can apply the correct STRIDE / MAESTRO / OWASP-LLM /
# OWASP-Agentic playbooks automatically when a user picks the service in
# the GUI editor.
#
# Schema (see kb/cloud_catalog/README for the full spec):
#   vendor                : "Azure" (case-insensitive — matches metadata.vendor)
#   product               : canonical short ID (snake_case, lowercase)
#   display_name          : human readable label
#   component_type        : MUST be in the ATMS ComponentType literal list
#   service_category      : free-text grouping (compute / storage / ai / ...)
#   applies_to_ai_workflows: true for AI/ML, identity, anything an LLM agent
#                            may directly invoke as a tool. False for pure
#                            infra plumbing.
#   threats_specific      : per-service threats not already covered by the
#                            generic playbook (empty unless we have a strong
#                            signal — over-claiming creates noise).
#   references            : canonical vendor doc URL(s)
#   ai_context            : free text — why this matters for AI workflows
# -------------------------------------------------------------------------

# ────────────────────────── Compute ────────────────────────────────────────
- vendor: Azure
  product: virtual_machines
  display_name: Azure Virtual Machines
  component_type: cloud_compute
  service_category: compute
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/virtual-machines/
  ai_context: |
    Hosts self-managed inference runtimes, RAG indexers, fine-tuning jobs and
    agent processes. Tenant retains full responsibility for OS patching,
    secret-handling and outbound network egress used for model calls.

- vendor: Azure
  product: vmss
  display_name: Azure Virtual Machine Scale Sets
  component_type: cloud_compute
  service_category: compute
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/virtual-machine-scale-sets/
  ai_context: |
    Common backing for stateless inference fleets and burst RAG ingestion
    workers. Auto-scaling can mask resource-exhaustion / DoW (Denial-of-Wallet)
    attacks against LLM endpoints.

- vendor: Azure
  product: aks
  display_name: Azure Kubernetes Service (AKS)
  component_type: container_orchestrator
  service_category: compute
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/aks/
  ai_context: |
    Most common host for KServe / KubeRay / vLLM / Triton deployments and for
    LangChain/LangGraph agent runtimes. Workload identity and pod-level network
    policies are the primary controls against lateral movement from a
    compromised tool container.

- vendor: Azure
  product: container_instances
  display_name: Azure Container Instances (ACI)
  component_type: container_runtime
  service_category: compute
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/container-instances/
  ai_context: |
    Often used to spin up short-lived MCP servers or sandboxed code-execution
    tools invoked by agents. No shared cluster context limits blast radius
    but each instance still inherits the managed identity it is bound to.

- vendor: Azure
  product: app_service
  display_name: Azure App Service
  component_type: web_application
  service_category: compute
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/app-service/
  ai_context: |
    Hosts user-facing chat UIs and the public HTTPS surface of agent backends.
    Combined with Easy Auth this is where most prompt-injection payloads first
    arrive.

- vendor: Azure
  product: container_apps
  display_name: Azure Container Apps
  component_type: container_runtime
  service_category: compute
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/container-apps/
  ai_context: |
    Serverless containers with KEDA scaling — frequently used for RAG ingestion
    pipelines and LLM-backed microservices. Dapr integration adds an
    agent-style sidecar invocation surface worth modelling separately.

- vendor: Azure
  product: functions
  display_name: Azure Functions
  component_type: serverless_function
  service_category: compute
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/azure-functions/
  ai_context: |
    Glue between LLM agents and Azure services. A tool-call from the agent
    often lands in a Function with a managed identity wider than the agent
    itself — privilege-elevation pivot point.

- vendor: Azure
  product: batch
  display_name: Azure Batch
  component_type: batch_compute
  service_category: compute
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/batch/
  ai_context: |
    Used for offline embedding generation, large-scale fine-tuning data
    preprocessing and bulk inference. Pool-level access to storage accounts
    must be scoped tightly to prevent training-data exfiltration.

- vendor: Azure
  product: arc
  display_name: Azure Arc
  component_type: cloud_compute
  service_category: compute
  applies_to_ai_workflows: false
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/azure-arc/
  ai_context: |
    Extends Azure control plane to on-prem and other clouds. When LLM agents
    run against Arc-enrolled servers, the Arc agent is the trust pivot — its
    compromise yields multi-cloud lateral movement.

- vendor: Azure
  product: dedicated_host
  display_name: Azure Dedicated Host
  component_type: cloud_compute
  service_category: compute
  applies_to_ai_workflows: false
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/virtual-machines/dedicated-hosts
  ai_context: |
    Physical isolation for compliance-bound model workloads (e.g., regulated
    PII fine-tuning). Reduces side-channel risk from noisy neighbours.

- vendor: Azure
  product: spring_apps
  display_name: Azure Spring Apps
  component_type: web_application
  service_category: compute
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/spring-apps/
  ai_context: |
    Hosts Java-based AI orchestration apps (Spring AI). The platform handles
    cert rotation and service registry — misconfigured ingress is the main
    exposure for embedded LLM endpoints.

# ────────────────────────── Storage ───────────────────────────────────────
- vendor: Azure
  product: blob_storage
  display_name: Azure Blob Storage
  component_type: object_storage
  service_category: storage
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/storage/blobs/
  ai_context: |
    Primary store for RAG corpora, fine-tuning datasets, model artefacts and
    chat transcripts. Anonymous-blob and over-broad SAS tokens are the
    leading causes of training-data leakage in Azure-hosted AI systems.

- vendor: Azure
  product: data_lake_storage_gen2
  display_name: Azure Data Lake Storage Gen2
  component_type: data_lake
  service_category: storage
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/storage/blobs/data-lake-storage-introduction
  ai_context: |
    Hierarchical-namespace blob used by Synapse, Databricks and Fabric to back
    feature stores and training data lakes. ACL drift between filesystem and
    blob ACLs is a common over-privilege source.

- vendor: Azure
  product: disk_storage
  display_name: Azure Managed Disks
  component_type: block_storage
  service_category: storage
  applies_to_ai_workflows: false
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/virtual-machines/managed-disks-overview
  ai_context: |
    Persistent block storage for GPU VMs running training/inference. Customer
    managed keys (CMK) on disks scope blast radius if a VM is compromised.

- vendor: Azure
  product: files
  display_name: Azure Files
  component_type: file_storage
  service_category: storage
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/storage/files/
  ai_context: |
    SMB/NFS share commonly mounted across AKS pods for shared model weights
    and prompt template stores. Identity-based auth (Entra Kerberos) replaces
    legacy storage-key auth for AI workloads.

- vendor: Azure
  product: netapp_files
  display_name: Azure NetApp Files
  component_type: file_storage
  service_category: storage
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/azure-netapp-files/
  ai_context: |
    High-throughput NFS for HPC and large-model training checkpoints. Often
    chosen for Llama-class fine-tuning runs.

- vendor: Azure
  product: backup
  display_name: Azure Backup
  component_type: backup_service
  service_category: storage
  applies_to_ai_workflows: false
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/backup/
  ai_context: |
    Recovery Services Vaults hold encrypted backups including model weights
    and vector DBs. Soft-delete + immutability protects against ransomware on
    training assets.

- vendor: Azure
  product: site_recovery
  display_name: Azure Site Recovery
  component_type: backup_service
  service_category: storage
  applies_to_ai_workflows: false
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/site-recovery/
  ai_context: |
    DR replication for VMs running self-hosted inference. Failover playbooks
    should be exercised against AI workloads with realistic RPO targets.

- vendor: Azure
  product: storsimple
  display_name: Azure StorSimple
  component_type: file_storage
  service_category: storage
  applies_to_ai_workflows: false
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/storsimple/
  ai_context: |
    Legacy hybrid storage appliance (retiring). Migration target should be
    Files or NetApp Files for AI training data.

- vendor: Azure
  product: storage_mover
  display_name: Azure Storage Mover
  component_type: file_storage
  service_category: storage
  applies_to_ai_workflows: false
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/storage-mover/
  ai_context: |
    Migration service used to onboard on-prem training corpora into Blob/ADLS.
    Service principal scope should be limited to the migration window.

# ────────────────────────── Database ──────────────────────────────────────
- vendor: Azure
  product: sql_database
  display_name: Azure SQL Database
  component_type: database
  service_category: database
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/azure-sql/database/
  ai_context: |
    Frequently used as a Text-to-SQL target by LLM agents — Always Encrypted
    + row-level security are the dominant controls against agent-driven
    data exfiltration.

- vendor: Azure
  product: sql_managed_instance
  display_name: Azure SQL Managed Instance
  component_type: database
  service_category: database
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/azure-sql/managed-instance/
  ai_context: |
    Near-100% SQL-Server compatibility with VNet integration. Often the
    landing zone for lift-and-shifted PII datasets used in RAG pipelines.

- vendor: Azure
  product: postgresql_flexible_server
  display_name: Azure Database for PostgreSQL Flexible Server
  component_type: database
  service_category: database
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/postgresql/flexible-server/
  ai_context: |
    Hosts pgvector — by far the most common low-cost RAG vector store in
    Azure. Same instance frequently holds both vectors and source PII which
    amplifies blast radius on agent prompt injection.

- vendor: Azure
  product: mysql_flexible_server
  display_name: Azure Database for MySQL Flexible Server
  component_type: database
  service_category: database
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/mysql/flexible-server/
  ai_context: |
    Common backend for application metadata that agents query. Private
    Endpoint should be enforced if accessible from LLM tool calls.

- vendor: Azure
  product: mariadb
  display_name: Azure Database for MariaDB
  component_type: database
  service_category: database
  applies_to_ai_workflows: false
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/mariadb/
  ai_context: |
    Legacy managed MariaDB (retirement announced). Migration target is
    typically MySQL Flexible Server for AI/analytics workloads.

- vendor: Azure
  product: cosmos_db
  display_name: Azure Cosmos DB
  component_type: nosql_database
  service_category: database
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/cosmos-db/
  ai_context: |
    Backend store for the Microsoft-hosted Foundry Agent Service — tenant has
    no direct visibility, increasing supply-chain risk on the Microsoft side.
    Also widely used as a vector store (Cosmos DB for NoSQL vector search).

- vendor: Azure
  product: cosmos_db_mongo
  display_name: Azure Cosmos DB for MongoDB (vCore)
  component_type: nosql_database
  service_category: database
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/cosmos-db/mongodb/vcore/
  ai_context: |
    MongoDB-compatible API with native vector search — frequently used as a
    RAG store with chat-history co-resident, so a single injection can pivot
    across both surfaces.

- vendor: Azure
  product: cosmos_db_cassandra
  display_name: Azure Cosmos DB for Apache Cassandra
  component_type: nosql_database
  service_category: database
  applies_to_ai_workflows: false
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/cosmos-db/cassandra/
  ai_context: |
    Cassandra-compatible API. Frequently chosen for high-throughput telemetry
    backing AI observability stacks.

- vendor: Azure
  product: cosmos_db_gremlin
  display_name: Azure Cosmos DB for Gremlin
  component_type: graph_database
  service_category: database
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/cosmos-db/gremlin/
  ai_context: |
    Graph store sometimes used for GraphRAG style knowledge graphs feeding
    LLM agents. Inject-via-query patterns are the main concern.

- vendor: Azure
  product: cosmos_db_table
  display_name: Azure Cosmos DB for Table
  component_type: nosql_database
  service_category: database
  applies_to_ai_workflows: false
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/cosmos-db/table/
  ai_context: |
    Premium evolution of Azure Table Storage. Often paired with Functions for
    AI event metadata.

- vendor: Azure
  product: cache_for_redis
  display_name: Azure Cache for Redis
  component_type: cache_store
  service_category: database
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/azure-cache-for-redis/
  ai_context: |
    Holds LLM response caches, agent short-term memory and rate-limit
    counters. A poisoned cache entry can replay malicious model output to
    every downstream agent until invalidated.

- vendor: Azure
  product: sql_server_on_vms
  display_name: SQL Server on Azure VMs
  component_type: database
  service_category: database
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/azure-sql/virtual-machines/
  ai_context: |
    IaaS SQL Server. Tenant owns CU/CVE patching; commonly holds the system
    of record that an LLM agent translates natural-language queries against.

- vendor: Azure
  product: synapse_analytics
  display_name: Azure Synapse Analytics
  component_type: data_warehouse
  service_category: database
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/synapse-analytics/
  ai_context: |
    Unified analytics platform — frequently the source-of-truth used by AI
    Search / Cognitive Search to populate RAG indices. Workspace identity
    boundaries are easy to mis-scope.

- vendor: Azure
  product: fabric
  display_name: Microsoft Fabric
  component_type: data_warehouse
  service_category: database
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/fabric/
  ai_context: |
    Unified data platform (OneLake, Warehouse, Lakehouse, Real-Time) with
    Copilot integration. Workspace permissions translate directly to
    Copilot's data reach.

- vendor: Azure
  product: data_explorer
  display_name: Azure Data Explorer (Kusto)
  component_type: time_series_database
  service_category: database
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/data-explorer/
  ai_context: |
    KQL store used by Sentinel and Application Insights — increasingly used
    as a natural-language analytics target ("ask Copilot to summarise the
    logs"). Row-level security gates this.

# ────────────────────────── Network ───────────────────────────────────────
- vendor: Azure
  product: vnet
  display_name: Azure Virtual Network
  component_type: network_segment
  service_category: network
  applies_to_ai_workflows: false
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/virtual-network/
  ai_context: |
    Foundational network boundary. AI workloads should sit in dedicated
    subnets with NSGs that block direct internet egress except through a
    firewall/proxy.

- vendor: Azure
  product: expressroute
  display_name: Azure ExpressRoute
  component_type: vpn_gateway
  service_category: network
  applies_to_ai_workflows: false
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/expressroute/
  ai_context: |
    Private fibre into Azure. Carries on-prem RAG sources, training corpora
    and inference traffic from regulated workloads.

- vendor: Azure
  product: vpn_gateway
  display_name: Azure VPN Gateway
  component_type: vpn_gateway
  service_category: network
  applies_to_ai_workflows: false
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/vpn-gateway/
  ai_context: |
    Site-to-site / point-to-site IPsec. Often the path through which an
    on-prem ETL pushes training data into ADLS.

- vendor: Azure
  product: front_door
  display_name: Azure Front Door
  component_type: cdn
  service_category: network
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/frontdoor/
  ai_context: |
    Global L7 with bundled WAF. Sits in front of public chat UIs and agent
    APIs — rate-limit and bot-management rules are the first defence against
    DoW (denial-of-wallet) attacks on LLMs.

- vendor: Azure
  product: application_gateway
  display_name: Azure Application Gateway
  component_type: load_balancer
  service_category: network
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/application-gateway/
  ai_context: |
    Regional L7 with WAF v2 — fronts AKS-hosted inference services. Custom
    rules can block prompt-injection signatures at the edge.

- vendor: Azure
  product: load_balancer
  display_name: Azure Load Balancer
  component_type: load_balancer
  service_category: network
  applies_to_ai_workflows: false
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/load-balancer/
  ai_context: |
    L4 only. Common for internal inference pools where TLS terminates at the
    pod.

- vendor: Azure
  product: traffic_manager
  display_name: Azure Traffic Manager
  component_type: dns_service
  service_category: network
  applies_to_ai_workflows: false
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/traffic-manager/
  ai_context: |
    DNS-level traffic distribution. Useful for multi-region active-active
    LLM endpoints with regional data residency.

- vendor: Azure
  product: cdn
  display_name: Azure CDN
  component_type: cdn
  service_category: network
  applies_to_ai_workflows: false
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/cdn/
  ai_context: |
    Edge caching. Retiring in favour of Front Door — static assets only,
    AI APIs should not be cached at the CDN layer.

- vendor: Azure
  product: ddos_protection
  display_name: Azure DDoS Protection
  component_type: ddos_mitigation
  service_category: network
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/ddos-protection/
  ai_context: |
    L3/L4 volumetric protection. AI endpoints are favoured DDoS targets
    because each request costs significant inference budget.

- vendor: Azure
  product: firewall
  display_name: Azure Firewall
  component_type: firewall
  service_category: network
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/firewall/
  ai_context: |
    Stateful, managed firewall. Critical egress chokepoint when LLM agents
    can dynamically construct outbound HTTPS calls — FQDN tags and TLS
    inspection contain data exfil.

- vendor: Azure
  product: nat_gateway
  display_name: Azure NAT Gateway
  component_type: firewall
  service_category: network
  applies_to_ai_workflows: false
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/virtual-network/nat-gateway/
  ai_context: |
    Outbound SNAT. Pins source IPs for AI workloads needing IP allowlists at
    third-party LLM providers (e.g., OpenAI direct).

- vendor: Azure
  product: bastion
  display_name: Azure Bastion
  component_type: bastion_host
  service_category: network
  applies_to_ai_workflows: false
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/bastion/
  ai_context: |
    Managed RDP/SSH jump host. The proper way to administer GPU VMs hosting
    self-managed models without exposing 22/3389.

- vendor: Azure
  product: private_link
  display_name: Azure Private Link
  component_type: private_link
  service_category: network
  applies_to_ai_workflows: true
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/private-link/
  ai_context: |
    Brings PaaS endpoints (OpenAI, Cosmos, Storage, Key Vault) onto VNet
    private IPs. The primary mitigation against tenant-side data exfiltration
    via public endpoints.

- vendor: Azure
  product: virtual_wan
  display_name: Azure Virtual WAN
  component_type: transit_gateway
  service_category: network
  applies_to_ai_workflows: false
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/virtual-wan/
  ai_context: |
    Hub-and-spoke SD-WAN for global enterprises. Common transit for branch
    offices that need to reach centralized AI services.

- vendor: Azure
  product: route_server
  display_name: Azure Route Server
  component_type: router
  service_category: network
  applies_to_ai_workflows: false
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/route-server/
  ai_context: |
    BGP peering with NVAs. Network-layer trust pivot — a compromised NVA can
    blackhole AI service traffic.

- vendor: Azure
  product: dns
  display_name: Azure DNS
  component_type: dns_service
  service_category: network
  applies_to_ai_workflows: false
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/dns/
  ai_context: |
    Authoritative DNS for the chat UI vanity hostname. Hijacking the zone
    redirects users to a phishing front-end that harvests prompts.

- vendor: Azure
  product: private_dns
  display_name: Azure Private DNS
  component_type: dns_service
  service_category: network
  applies_to_ai_workflows: false
  threats_specific: []
  references:
    - https://learn.microsoft.com/en-us/azure/dns/private-dns-overview
  ai_context: |
    Resolves Private Endpoint FQDNs to private IPs. Mis-resolution silently
    breaks Private Link and falls back to public.

- vendor: Azure
  product: web_application_firewall
  display_name: Azure Web Application Firewall
  component_type: waf
  service_category: network
  applies_to_ai_workflows: true

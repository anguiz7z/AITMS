# MITRE ATT&CK Enterprise + ICS — curated subset for IT, OT, network, identity systems.
# Source: https://attack.mitre.org/  (Enterprise v15) / https://attack.mitre.org/matrices/ics/  (ICS v15)
# Curated to cover the threats referenced by playbooks shipped with ATMS v0.10:
# database, firewall, directory_service, web_application, endpoint, legacy_mainframe,
# plc, scada, iot_device, load_balancer, vpn_gateway, network_switch, email_server,
# mfa_service, industrial_protocol — as well as the AI / cloud component types that
# overlap with general IT attack patterns.

# Initial Access -----------------------------------------------------------------
- id: T1133
  name: External Remote Services
  description: |
    Adversaries may leverage external-facing remote services (VPNs, Citrix,
    Windows Remote Management, RDP gateways, SSH bastions) to gain initial
    access to and persist within an enterprise.
  tactics: [Initial Access, Persistence]
  platforms: [Windows, Linux, macOS, Network]
  applies_to:
    - vpn_gateway
    - firewall
    - directory_service
    - legacy_mainframe
    - load_balancer
    - api_gateway
    - network_segment
    - iot_device
  keywords:
    - vpn
    - remote
    - rdp
    - ssh
    - citrix
    - external
    - bastion
    - gateway
    - exposed
    - internet-facing
  references:
    - https://attack.mitre.org/techniques/T1133/

- id: T1190
  name: Exploit Public-Facing Application
  description: |
    Adversaries exploit a weakness in an Internet-facing application
    (web app, API, network appliance management plane) to gain initial
    access. Includes SQL-injection, deserialisation, and CVE-driven RCEs.
  tactics: [Initial Access]
  platforms: [Windows, Linux, macOS, Network]
  applies_to:
    - web_application
    - api_gateway
    - load_balancer
    - vpn_gateway
    - firewall
    - email_server
    - database
    - plc
    - scada
    - iot_device
    - serverless_function
    - container_runtime
  keywords:
    - exploit
    - cve
    - rce
    - injection
    - public
    - exposed
    - unpatched
    - vulnerable
    - vulnerability
    - patch
    - sql
    - deserialization
    - ssrf
  references:
    - https://attack.mitre.org/techniques/T1190/

- id: T1566
  name: Phishing
  description: |
    Adversaries send phishing messages to gain access to victim systems.
    All forms of phishing are electronically delivered social engineering.

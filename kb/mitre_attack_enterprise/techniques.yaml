# Collection / Adversary-in-the-Middle ------------------------------------------
- id: T1557
  name: Adversary-in-the-Middle
  description: |
    Adversaries place themselves between two networked devices to support
    follow-on behaviors such as Network Sniffing, Transmitted Data
    Manipulation, or replayed authentication. Includes ARP cache
    poisoning, LLMNR/NBT-NS spoofing, DHCP spoofing.
  tactics: [Credential Access, Collection]
  platforms: [Windows, Linux, macOS, Network]
  applies_to:
    - network_switch
    - network_segment
    - endpoint
    - load_balancer
  keywords:
    - mitm
    - arp
    - dhcp
    - llmnr
    - nbt-ns
    - poison
    - spoof
    - relay
  references:
    - https://attack.mitre.org/techniques/T1557/

- id: T1114
  name: Email Collection
  description: |
    Adversaries target user email to collect sensitive information.
    May be obtained via mailbox auto-forwarding, mailbox export
    (PST/OST) or direct mailbox API access.

  platforms: [Windows, Office 365, Google Workspace]
  applies_to:
    - email_server
  keywords:
    - email
    - mailbox
    - inbox
    - forward
    - export
    - pst
    - mail
  references:
    - https://attack.mitre.org/techniques/T1114/

- id: T1114.003
  name: "Email Collection: Email Forwarding Rule"

# Execution ----------------------------------------------------------------------
- id: T1059
  name: Command and Scripting Interpreter
  description: |
    Adversaries abuse command and script interpreters (PowerShell, cmd,
    bash, Python, JavaScript, Visual Basic) to execute commands. This
    parent technique covers cases where the adversary's choice of shell
    is unspecified or varied — see T1059.001 (PowerShell), T1059.003
    (cmd), T1059.007 (JavaScript), etc. for the specific sub-techniques.
  tactics: [Execution]
  platforms: [Windows, Linux, macOS, Network]
  applies_to:
    - endpoint
    - scada
    - plc
    - legacy_mainframe
    - web_application
    - api_gateway
    - container_runtime
  keywords:
    - powershell
    - cmd
    - bash
    - shell
    - interpreter
    - script
    - command-line
  references:
    - https://attack.mitre.org/techniques/T1059/

- id: T1059.007
  name: "Command and Scripting Interpreter: JavaScript"
  description: |
    Adversaries abuse JavaScript to execute commands or evade defenses.
    On the web, this manifests as XSS/DOM-based code injection and is
    a key vector against custom web apps.
  tactics: [Execution]
  platforms: [Windows, Linux, macOS]
  applies_to:
    - web_application
    - endpoint
    - api_gateway
  keywords:
    - javascript
    - js
    - xss
    - script
    - injection
    - dom
    - browser
  references:
    - https://attack.mitre.org/techniques/T1059/007/

- id: T1203
  name: Exploitation for Client Execution
  description: |
    Adversaries exploit a vulnerability in a client application (browser,
    Office, PDF reader) to execute code on a user's endpoint, typically
    delivered via T1566.
  tactics: [Execution]
  platforms: [Windows, Linux, macOS]
  applies_to:
    - endpoint
    - user
  keywords:
    - exploit
    - browser
    - office
    - macro
    - pdf
    - client
    - drive-by
    - rce
    - vulnerability
    - cve
  references:
    - https://attack.mitre.org/techniques/T1203/


    - gitops
  ai_specific: false
  url: https://learn.microsoft.com/azure/cloud-adoption-framework/ready/enterprise-scale/deploy-landing-zones-with-terraform
  short_summary: |
    ALZ is deployed via the AVM (Azure Verified Modules) Terraform /
    Bicep accelerator with PR-gated changes. No portal click-ops on
    platform subscriptions.

- id: Azure_LZA.PLAT.2
  display_name: GitHub Advanced Security / Defender for DevOps in CI
  framework: Azure_LZA
  category: governance
  applies_to_component_types:
    - ci_cd_pipeline
    - code_repository
    - vulnerability_scanner
  keywords:
    - github advanced security
    - codeql
    - dependabot
    - defender for devops
    - msdo
  ai_specific: false

# ─── AI-specific landing-zone patterns ───────────────────────────────────
- id: Azure_LZA.AI.1
  display_name: AI Foundry / Azure OpenAI behind Private Endpoint with disabled public access
  framework: Azure_LZA
  category: network
  applies_to_component_types:
    - llm_inference
    - private_link
    - rag_vector_store
  keywords:
    - azure openai
    - foundry
    - private endpoint
    - public network access disabled
    - ai search
  ai_specific: true
  url: https://learn.microsoft.com/azure/ai-services/cognitive-services-virtual-networks
  short_summary: |
    Azure OpenAI, AI Foundry projects and AI Search are deployed with
    publicNetworkAccess=Disabled and Private Endpoints into the
    workload spoke. Outbound traffic from prompt-flow / agents goes
    through the hub Azure Firewall.

- id: Azure_LZA.AI.2
  display_name: Azure AI Content Safety wired into every prompt + completion
  framework: Azure_LZA
  category: data
  applies_to_component_types:
    - content_safety_classifier
    - guardrails
    - output_filter
    - llm_inference
  keywords:
    - content safety
    - prompt shield
    - jailbreak
    - groundedness
    - protected material
  ai_specific: true
  url: https://learn.microsoft.com/azure/ai-services/content-safety/overview
  short_summary: |
    Content Safety + Prompt Shields screen every prompt for direct +
    indirect jailbreaks, and every completion for harmful categories,
    protected material and groundedness against retrieved context.

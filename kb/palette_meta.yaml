# Editor palette metadata — emoji_overrides + group_order.
#
# Read by scripts/gen_palette.py when generating
# src/atms/static/palette-data.json. The 121 ComponentType values and
# their groups come from src/atms/models.py; this file only carries:
#  - emoji_overrides: per-type 1-2 char display sigil. Defaults to a
#    deterministic 2-char abbreviation when unset.
#  - group_order: forces palette display order so AI/ML / Cloud /
#    Network / Identity / Security / Observability / Endpoints / OT /
#    Apps / Fallback render in a predictable top-to-bottom sequence.

# v0.16.10: emoji overrides reflect what shipped before the palette
# regenerated. New types get the deterministic abbreviation from

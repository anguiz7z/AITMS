- id: ISO27018.A.10
  framework: ISO27018
  title: PII intended for transmission is encrypted on portable media
  applies_to: [object_storage, block_storage, backup_service]
  keywords: [portable media, encryption at rest, removable storage]
  description: |
    ISO 27018 A.10. PII transmitted using physical / portable

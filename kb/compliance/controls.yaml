    counsel before disclosure.

- id: ISO27018.A.9
  framework: ISO27018
  title: Geographic location of PII storage disclosed to customer
  applies_to: [object_storage, database, data_warehouse]
  keywords: [data residency, sovereignty, location, region]
  description: |
    ISO 27018 A.9. The cloud service customer should be informed

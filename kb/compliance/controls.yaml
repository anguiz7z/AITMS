# Compliance control library (v0.13).
#
# Curated cross-walk between the threats ATMS raises and the control IDs
# auditors will quote. Each control entry tells the engine which threats
# it covers via:
#   applies_to     — component types where the control is most relevant
#   keywords       — substrings matched against threat title + description
#   stride_ai      — STRIDE-AI categories the control addresses (optional)
#   threat_id_glob — explicit threat-ID glob match (optional, last resort)
#
# Frameworks bundled:
#   - NIS2          — EU Directive 2022/2555, Article 21 measures
#   - DORA          — EU Reg. 2022/2554 (Digital Operational Resilience)
#   - EU AI Act     — Reg. 2024/1689 high-risk AI obligations
#   - GDPR          — EU Reg. 2016/679 (privacy)
#   - PCI DSS v4.0  — payment-card data
#   - HIPAA         — US health PHI
#   - NIST 800-53 r5 — US fed control catalogue
#   - NIST CSF 2.0  — risk-management framework
#   - ISO 27001:2022 / Annex A
#   - SEC cyber     — SEC 17 CFR 229 / 232 / 240 cybersecurity disclosure


# ─── ISO/IEC 27018:2019 (PII in public clouds) ───────────────────────────
- id: ISO27018.A.1
  framework: ISO27018
  title: Consent and choice — PII processed for explicit consented purposes
  applies_to: [ciam_platform, dlp, identity_provider]
  keywords: [consent, opt-in, opt-out, PII purpose]
  description: |
    ISO 27018 A.1. PII processed only for purposes explicitly
    consented by the PII principal.

- id: ISO27018.A.5
  framework: ISO27018
  title: PII transmission encryption (in transit)
  applies_to: [api_gateway, kms_key, vpn_gateway]
  keywords: [PII encryption, in transit, TLS, mTLS]
  description: |
    ISO 27018 A.5. PII transmitted over public networks should
    be encrypted.

- id: ISO27018.A.7
  framework: ISO27018
  title: PII disclosure to law enforcement requires legal review
  applies_to: [secrets_vault, dlp]
  keywords: [law enforcement, lawful access, gag order, disclosure]
  description: |
    ISO 27018 A.7. The cloud service provider should reject

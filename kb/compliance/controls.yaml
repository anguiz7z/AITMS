# SOC 2 Trust Services Criteria (AICPA TSC 2017, revised 2022).
# Common Criteria (CC) + four additional criteria (Availability,
# Confidentiality, Processing Integrity, Privacy). The framework
# every B2B SaaS sells against; the IDs auditors quote literally.

- id: SOC2.CC1.1
  framework: SOC2
  title: COSO Principle 1 - integrity and ethical values
  applies_to: [llm_inference, agent, iam_principal]
  keywords: [code of conduct, ethics, governance, integrity]
  description: |
    CC1.1. Demonstrate a commitment to integrity and ethical values.

- id: SOC2.CC2.1
  framework: SOC2
  title: Information and communication of internal control objectives
  applies_to: [observability_stack, log_aggregator, siem]
  keywords: [information, communication, audit log, internal control]
  description: |
    CC2.1. Obtain or generate relevant, quality information to support
    the functioning of internal control.

- id: SOC2.CC3.2
  framework: SOC2
  title: Risk-assessment process identifying changes
  applies_to: [llm_inference, agent, ml_pipeline_orchestrator, container_runtime]

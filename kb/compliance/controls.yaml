    directly to OWASP-Agentic excessive-agency / autonomy threats.
  applies_to: [agent, llm_inference, tool, mcp_server]
  keywords: [human oversight, autonomy, agency, override, escalation, kill switch]

- id: EU_AI_ACT.15
  framework: EU_AI_Act
  title: Accuracy, robustness, cybersecurity
  description: |
    Article 15. AI systems must be resilient against attacks (evasion,
    poisoning, model-extraction, membership-inference).
  applies_to: [llm_inference, embedding_service, training_pipeline,
               fine_tuning_pipeline, model_registry, guardrails]
  keywords: [adversarial, evasion, poisoning, extraction, membership inference, robustness]

- id: EU_AI_ACT.50
  framework: EU_AI_Act

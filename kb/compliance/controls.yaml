# v0.18.32 Cycle VV — 4 more frameworks (mobile + secure-development + cloud).
# OWASP MASVS / OWASP SAMM / ISO 27017 (cloud) / ISO 27018 (PII in cloud).
# Brings total bundled frameworks to 15.

# ─── OWASP MASVS (Mobile App Security Verification Standard) v2 ──────────
- id: MASVS.STORAGE-1
  framework: OWASP_MASVS
  title: Sensitive data is only stored in app-private storage
  applies_to: [mobile_device, mdm_emm]
  keywords: [mobile, app storage, keychain, keystore, sensitive data]
  description: |
    MASVS-STORAGE-1. The app uses platform-secure storage APIs
    (iOS Keychain / Android Keystore) for sensitive data.

- id: MASVS.STORAGE-2
  framework: OWASP_MASVS
  title: No sensitive data leaks to system caches / logs
  applies_to: [mobile_device, log_aggregator]
  keywords: [mobile log, clipboard, screenshot, cache leak]
  description: |
    MASVS-STORAGE-2. No sensitive data in logs, screenshots, third-
    party clouds, IPC, or pasteboard.

- id: MASVS.CRYPTO-1
  framework: OWASP_MASVS
  title: Cryptography is platform-provided and current
  applies_to: [mobile_device, kms_key]
  keywords: [mobile crypto, broken cipher, weak key, deprecated]
  description: |
    MASVS-CRYPTO-1. Use only platform-provided crypto APIs; no
    home-grown crypto; no deprecated algorithms.

- id: MASVS.AUTH-1
  framework: OWASP_MASVS
  title: Authentication uses platform biometrics with fallback
  applies_to: [mobile_device, mfa_service, ciam_platform]
  keywords: [mobile biometrics, face id, touch id, fingerprint, fallback]
  description: |
    MASVS-AUTH-1. Use platform-secure biometric APIs with a
    documented fallback that preserves the security level.

- id: MASVS.NETWORK-1
  framework: OWASP_MASVS
  title: All network traffic is over TLS with cert pinning
  applies_to: [mobile_device, api_gateway, certificate_manager]
  keywords: [mobile tls, certificate pinning, mitm, app transport security]
  description: |
    MASVS-NETWORK-1. Enforce TLS 1.2+ + cert pinning on every
    outbound request; reject plaintext.

- id: MASVS.PLATFORM-1
  framework: OWASP_MASVS
  title: Sensitive functions require user re-authentication
  applies_to: [mobile_device, mfa_service]
  keywords: [step-up auth, transaction signing, sensitive action]
  description: |
    MASVS-PLATFORM-1. Sensitive functionality (payment, account
    change) requires step-up authentication.

- id: MASVS.CODE-1
  framework: OWASP_MASVS
  title: Mobile app is signed and tamper-detection is active
  applies_to: [mobile_device, mdm_emm, code_repository]
  keywords: [app signing, mobile tamper, root detection, jailbreak]
  description: |
    MASVS-CODE-1. The app is properly signed; runtime tamper /
    root / jailbreak detection is in place.

- id: MASVS.RESILIENCE-1
  framework: OWASP_MASVS
  title: Anti-debugging + anti-tamper on critical paths
  applies_to: [mobile_device]
  keywords: [debugger detection, frida, dynamic instrumentation]
  description: |
    MASVS-RESILIENCE-1. Detect debuggers, hooking frameworks
    (Frida / Xposed), and react (terminate / wipe / alert).


component_type: secrets_vault
description: |
  Cloud secret store — AWS Secrets Manager, Azure Key Vault (secrets), GCP
  Secret Manager, HashiCorp Vault. Holds API keys, DB credentials, signing
  keys, model-registry tokens used by the AI workload at runtime.
threats:
  - id: T_VAULT_001
    title: Over-broad read access to vault secrets
    stride_ai: [Information_Disclosure]
    owasp_llm: [LLM07:2025]
    owasp_agentic: [AGT09]
    owasp_api: [API3:2023, API5:2023]
    attack_cloud: [T1552, T1078.004]
    maestro: [M.L6.03]
    likelihood: 4
    impact: 5
    description: |
      A workload role can list / read every secret in the vault, not just the
      ones it needs. Compromise of the workload yields all credentials in
      that vault — DB, API keys, registry tokens, anything stored.
    mitigations:
      - "Per-secret IAM resource policies; explicit deny on `Get` outside the allowlist"
      - "Secret tagging + ABAC (only secrets tagged `service=this-app`)"
      - "Periodic audit of secret access patterns vs declared usage"
    refs: [AML.M0012, AML.M0019]

  - id: T_VAULT_002
    title: No automatic rotation of long-lived secrets
    stride_ai: [Information_Disclosure]
    owasp_api: [API2:2023, API8:2023]
    attack_cloud: [T1078, T1098.001]
    maestro: [M.L6.04]
    likelihood: 3
    impact: 4
    description: |
      Secrets sit in the vault for months or years without rotation. A historical
      leak (developer's laptop compromised 6 months ago) gives ongoing access.
    mitigations:
      - "Automated rotation for every supported secret type (RDS, IAM, OAuth)"
      - "Rotation-due-date alarms; CI checks for stale secrets"
      - "Document rotation cadence per secret class"
    refs: [AML.M0012]

  - id: T_VAULT_003
    title: Cross-region / cross-account secret replication leak
    stride_ai: [Information_Disclosure]
    owasp_api: []
    attack_cloud: [T1078.004, T1535]
    maestro: [M.X.04]
    likelihood: 2
    impact: 4
    description: |
      Secrets replicated to a region / account the security team doesn't monitor.
      Adversary moves to the unmonitored region and reads the replica.
    mitigations:
      - "Limit replication to monitored regions only"
      - "CloudTrail / log forwarding from EVERY active region"
      - "Service Control Policies disabling unused regions"
    refs: [AML.M0023]

  - id: T_VAULT_004
    title: Secret value embedded in error / log output
    stride_ai: [Information_Disclosure, Repudiation]
    owasp_llm: [LLM05:2025]
    owasp_api: [API8:2023]
    attack_cloud: [T1530]
    maestro: [M.L5.05]
    likelihood: 3
    impact: 4
    description: |
      Application logs the raw secret value (e.g. "auth failed with token X")
      to CloudWatch / App Insights. Logs persist longer than the secret,
      have wider read access than the secret, and frequently end up in
      external SIEMs.
    mitigations:
      - "Structured logging with secret-value redaction at the logger boundary"
      - "Detective control: regex sweep of logs for high-entropy strings"
      - "Pre-merge static analysis catching `log.info(token)` patterns"
    refs: [AML.M0023]

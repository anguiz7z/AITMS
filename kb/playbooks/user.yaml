component_type: user
description: |
  Human end-user interacting with the AI system. The user is both an actor and a trust
  boundary; threats here describe how users are targeted by or contribute to attacks.
threats:
  - id: T_USR_001
    applicable_to_topology: [has_ai_component]  # audit F070: AI-specific; suppress on pure-IT
    title: User social-engineered via AI output (misinformation)
    stride_ai: [Spoofing, Repudiation]
    owasp_llm: [LLM09:2025]
    atlas: [AML.T0048, AML.T0052]
    linddun: [U_001, U_002]
    csa_singapore: [CSA_AI.HUMAN.02]
    likelihood: 4
    impact: 3
    description: |
      AI produces content that misleads the user (fake citations, fake instructions,
      manipulative replies); user takes action and is harmed.
    mitigations:
      - "Confidence + source citations on every claim"
      - "User training: 'AI can be wrong; verify high-stakes claims'"
      - "Prominent UX disclaimer"
    refs: [AML.M0018, AML.M0020]

  - id: T_USR_002
    applicable_to_topology: [has_ai_component]  # audit F070: AI-specific; suppress on pure-IT
    title: User as injection vector (uploads adversarial content)
    stride_ai: [Tampering]
    owasp_llm: [LLM01:2025, LLM04:2025]
    atlas: [AML.T0051]
    nist_ai_100_2: [NIST_GAI_PROMPT_INJECTION_DIRECT]
    csa_singapore: [CSA_AI.HUMAN.02]
    likelihood: 4
    impact: 3
    description: |
      Users (especially in public-facing systems) upload prompts/documents that are deliberately
      adversarial (jailbreaks, poisoned content).
    mitigations:
      - "Input scanning at upload"
      - "Per-user reputation; throttle low-reputation users"
      - "Clear user policy + abuse reporting"
    refs: [AML.M0015, AML.M0020]

  - id: T_USR_003
    applicable_to_topology: [has_ai_component]  # audit F070: AI-specific; suppress on pure-IT
    title: User session hijack / cookie theft leading to AI account takeover
    stride_ai: [Spoofing, Information_Disclosure]
    owasp_llm: [LLM06:2025]
    owasp_api: [API2:2023]
    atlas: [AML.T0049]
    attack_cloud: [T1539, T1550.004]
    attack_enterprise: [T1539, T1555.003]
    maestro: [M.L7.03]
    linddun: [I_001, L_001]
    csa_singapore: [CSA_AI.HUMAN.02]
    likelihood: 4
    impact: 4
    description: |
      Infostealer malware on the user's device extracts the AI app's
      session cookies / OAuth tokens / browser-stored credentials. Attacker
      replays them and acts as the user — submits prompts on the user's
      behalf, reads chat history, exfiltrates the user's tenant data via
      legitimate UI. From the system's perspective the user is acting
      normally; from the user's perspective an unknown actor has free
      access to their AI account.
    mitigations:
      - "Bind session cookies to device fingerprint + IP + UA; reject mismatched replay"
      - "Short-lived session cookies (1-4 hour) + force re-auth on sensitive AI actions"
      - "Continuous Access Evaluation (CAE) revoking tokens on risk signals"
      - "Browser-isolation / sandboxed AI-chat tab for high-risk users"
    refs: [T1539, T1550.004, AML.M0019]

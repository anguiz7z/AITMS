# MAESTRO threats per layer + cross-layer threats.
# Source: CSA MAESTRO blog (2025-02-06). Threat names taken verbatim from the
# published framework where possible. Each entry includes:
#   id            — ATMS-local ID prefixed with M.<layer>.<n>
#   layer         — MAESTRO layer ID
#   name          — verbatim threat name from the framework
#   keywords      — for keyword-based enrichment
#   applies_to    — ATMS component types this threat tends to apply to
#   stride_ai     — the closest STRIDE-AI category mapping (heuristic)

# ─────────────────────────────────────────────────────────────── L1 Foundation
- id: M.L1.01
  layer: M.L1
  name: Adversarial Examples
  keywords: [adversarial example, evasion, perturbation]
  applies_to: [llm_inference, output_filter, guardrails]
  stride_ai: [Defense_Evasion, Tampering]

- id: M.L1.02
  layer: M.L1
  name: Model Stealing
  keywords: [model stealing, model extraction, distillation]
  applies_to: [llm_inference]
  stride_ai: [Information_Disclosure]

- id: M.L1.03
  layer: M.L1
  name: Backdoor Attacks
  keywords: [backdoor, trigger, trojan]
  applies_to: [model_registry, fine_tuning_pipeline, llm_inference]
  stride_ai: [Tampering]

- id: M.L1.04
  layer: M.L1
  name: Membership Inference Attacks
  keywords: [membership inference, training data leak]
  applies_to: [llm_inference]
  stride_ai: [Information_Disclosure]

- id: M.L1.05
  layer: M.L1
  name: Data Poisoning (Training Phase)
  keywords: [training data poisoning, label flip]
  applies_to: [training_pipeline, fine_tuning_pipeline]
  stride_ai: [Tampering]

- id: M.L1.06
  layer: M.L1
  name: Reprogramming Attacks
  keywords: [reprogramming, model reuse, prompt reprogram]
  applies_to: [llm_inference]
  stride_ai: [Tampering, Elevation_of_Privilege]

- id: M.L1.07
  layer: M.L1
  name: Denial of Service (Foundation Model)
  keywords: [dos, sponge attack, token flood]
  applies_to: [llm_inference]
  stride_ai: [Denial_of_Service]


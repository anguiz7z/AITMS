# This is a selected subset (~120 CVEs) covering the highest-impact
# entries known to be relevant to ATMS' component types: AI/cloud, IT,
# OT, network gear, identity, email. The full KEV catalogue has ~1,400
# rows; refresh with `atms refresh-feeds --kev` to pull the live CSV.
#
# Schema:
#   - cve: CVE-YYYY-NNNN
#     vendor: vendor name
#     product: product family (matches device-catalog product names)
#     description: one-line CISA description
#     date_added: YYYY-MM-DD when CISA added the CVE to KEV
